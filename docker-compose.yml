services:
  web:
    build:
      context: .
      args:
        # Frisches Klonen erzwingen: docker compose build --build-arg CACHEBUST=$(date +%s)
        CACHEBUST: ${CACHEBUST:-1}
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATA_DIR=/app/data
    # Secrets (SESSION_SECRET, ADMIN_PASSWORD_HASH) kommen aus dem Hostinger-
    # Umgebungsvariablen-Panel (in den Container injiziert). Eine optionale
    # .env.production wird zusätzlich geladen, falls vorhanden.
    env_file:
      - path: .env.production
        required: false
    volumes:
      - vayve_data:/app/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.vayve.rule=Host(`vayve.de`) || Host(`www.vayve.de`)"
      - "traefik.http.routers.vayve.entrypoints=websecure"
      - "traefik.http.routers.vayve.tls.certresolver=letsencrypt"
      - "traefik.http.services.vayve.loadbalancer.server.port=3000"

volumes:
  vayve_data:
